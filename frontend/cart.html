<!DOCTYPE html>
<!-- File Overview: frontend/cart.html — cart for frontend UI behavior. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - FIXIO</title>
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <main class="cart-page">
    <header class="cart-header">
      <h1>Your Shopping Cart</h1>
      <button type="button" class="back-btn" onclick="goHome()">← Back Home</button>
    </header>

    <section class="cart-content">
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">$0</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <strong id="total">$0</strong>
        </div>
        <div class="payment-box" aria-label="Payment method">
          <p class="payment-title">Choose payment method</p>
          <label class="payment-option">
            <input type="radio" name="payment-method" value="cod" checked>
            <span>Cash on Delivery</span>
          </label>
          <label class="payment-option">
            <input type="radio" name="payment-method" value="online">
            <span>Pay Online (Mock)</span>
          </label>
          <p class="payment-note" id="payment-note">You will pay when the service professional arrives.</p>
        </div>
        <button type="button" class="checkout-btn" onclick="handleCheckout()">Proceed to Payment</button>
        <button type="button" class="clear-btn" onclick="handleClearCart()">Clear Cart</button>
      </div>
    </section>
  </main>

  <script src="js/cart.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
